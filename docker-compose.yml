services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-flipkart_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flipkart_clone}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-flipkart_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flipkart_clone}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-string}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
